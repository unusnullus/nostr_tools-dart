name: nostr_tools
description: A Dart package that makes it easy to work with the nostr protocol and develop Nostr clients.
version: 1.0.9
repository: https://github.com/aniketambore/nostr_tools
homepage: https://github.com/aniketambore/nostr_tools
license: MIT

environment:
  sdk: '>=2.19.0'

dependencies:
  convert: ^3.1.1
  crypto: ^3.0.2
  bip340: ^0.3.1
  bech32: ^0.2.2
  web_socket_channel: ^3.0.0
  http: ^1.1.0
  pointycastle: ^4.0.0
  meta: ^1.8.0

  kepler:
    git:
      url: https://github.com/unusnullus/kepler-dart
      ref: master
  bip39:
    git:
      url: https://github.com/unusnullus/bip39-dart
      ref: master
  bip32:
    git:
      url: https://github.com/unusnullus/bip32-dart
      ref: master


dev_dependencies:
  lints: ^2.0.0
  test: ^1.21.0
